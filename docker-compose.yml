services:
  chroma:
    image: chromadb/chroma:latest
    command: ["run", "--host", "0.0.0.0", "--port", "8000", "--path", "/chroma/chroma"]
    security_opt:
      - apparmor=unconfined
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=False